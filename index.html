<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MudanzasHub Costa Rica - Solución Total V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        /* ESTILOS BASE Y MEJORAS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #fff; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 440px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .logo { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #00d4ff; display: flex; align-items: center; gap: 10px; }
        .user-greeting { background: linear-gradient(135deg, #1a3a3a, #2a2a2a); border: 1px solid #00d4ff44; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: 600; color: #aaa; }
        .search-input { width: 100%; padding: 11px 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 14px; }
        .search-input:focus { outline: none; border-color: #00d4ff; box-shadow: 0 0 10px rgba(0,212,255,0.3); }
        .btn { width: 100%; padding: 13px; background: #00d4ff; color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.3s ease; }
        .btn:hover { background: #00b8d4; transform: translateY(-2px); }
        .btn-secondary { background: #333; color: #fff; margin-bottom: 10px; }
        .btn-sm { width: auto; padding: 7px 14px; font-size: 12px; display: inline-block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; border: 1px solid #444; border-radius: 12px; padding: 28px; width: 92%; max-width: 620px; max-height: 92vh; overflow-y: auto; position: relative; }
        .modal-header { font-size: 19px; font-weight: bold; margin-bottom: 18px; color: #00d4ff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; }
        .section { display: none; }
        .section.active { display: block; }
        .tabs { display: flex; background: #222; border-radius: 8px; padding: 4px; margin-bottom: 18px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; color: #888; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 6px; white-space: nowrap; }
        .tab-btn.active { background: #333; color: #00d4ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .admin-table th { text-align: left; padding: 8px; background: #222; color: #aaa; border: 1px solid #333; }
        .admin-table td { padding: 8px; border: 1px solid #222; }
        .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .status-pending { background: #f59e0b22; color: #f59e0b; }
        .status-in_progress { background: #3b82f622; color: #3b82f6; }
        .status-completed { background: #10b98122; color: #10b981; }
        .transportista-card { background: #2a2a2a; border: 1px solid #444; border-radius: 10px; padding: 16px; margin-bottom: 14px; cursor: pointer; }
        .uber-job-card { background: linear-gradient(135deg, #2a2a2a 0%, #303030 100%); border: 2px solid #00d4ff; border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .job-price { font-size: 20px; font-weight: bold; color: #4ade80; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 13px; }
        .detail-item { background: #222; padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .detail-label { color: #888; font-size: 11px; margin-bottom: 4px; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; margin-bottom: 10px; }
        .factura-box { background: #fff; color: #000; padding: 20px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; }
        .factura-header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
        .factura-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
        .factura-total { border-top: 2px solid #000; padding-top: 10px; margin-top: 10px; font-weight: bold; font-size: 16px; }
        .finance-card { background: #1a3a3a; padding: 15px; border-radius: 10px; border: 1px solid #00d4ff44; margin-bottom: 15px; }
        .clickable-row { cursor: pointer; transition: background 0.2s; }
        .clickable-row:hover { background: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <!-- SECCIÓN AUTENTICACIÓN -->
        <div class="section active" id="authSection">
            <div class="logo"><i class="fas fa-truck"></i> MudanzasHub</div>
            <div class="form-group"><label>Email</label><input type="email" id="authEmail" class="search-input" placeholder="Ingresa tu email"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="authPassword" class="search-input" placeholder="Ingresa tu contraseña"></div>
            <div class="form-group">
                <label>Rol</label>
                <select id="authRole" class="search-input">
                    <option value="client">Cliente</option>
                    <option value="transporter">Transportista</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
            <button class="btn" id="loginBtn">Entrar</button>
            <p id="connStatus" style="font-size:11px; color:#666; margin-top:15px; text-align:center;">Cargando Firebase...</p>
        </div>

        <!-- SECCIÓN CLIENTE -->
        <div class="section" id="clientSection">
            <div class="logo"><i class="fas fa-truck"></i> MudanzasHub</div>
            <div class="user-greeting"><i class="fas fa-user"></i> <span id="clientNameDisplay">Cliente</span></div>
            <button class="btn btn-secondary logoutBtn">Cerrar Sesión</button>
            
            <div class="form-group">
                <label>Origen</label>
                <input type="text" id="originSearch" class="search-input" placeholder="¿De dónde salen?">
                <div id="originSuggestions" class="search-suggestions"></div>
            </div>
            <div class="form-group">
                <label>Destino</label>
                <input type="text" id="destinationSearch" class="search-input" placeholder="¿A dónde van?">
                <div id="destinationSuggestions" class="search-suggestions"></div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:18px;">
                <div style="flex:1;">
                    <label style="font-size:12px; color:#aaa;">Peso (kg)</label>
                    <input type="number" id="loadWeight" class="search-input" value="100">
                </div>
                <div style="flex:1;">
                    <label style="font-size:12px; color:#aaa;">Vehículo</label>
                    <select id="vehicleType" class="search-input">
                        <option value="pickup">Pickup</option>
                        <option value="buseta">Buseta</option>
                        <option value="camion">Camión</option>
                    </select>
                </div>
            </div>

            <button class="btn" id="searchTransportersBtn">Ver Ofertas</button>
            <div id="transportistasList" style="margin-top:20px;"></div>
        </div>

        <!-- SECCIÓN TRANSPORTISTA -->
        <div class="section" id="transporterSection">
            <div class="logo"><i class="fas fa-truck"></i> MudanzasHub</div>
            <div class="user-greeting"><i class="fas fa-id-card"></i> <span id="transNameDisplay">Transportista</span></div>
            <button class="btn btn-secondary logoutBtn">Cerrar Sesión</button>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="jobs">Ofertas</button>
                <button class="tab-btn" data-tab="active">En Curso</button>
                <button class="tab-btn" data-tab="history">Historial</button>
            </div>
            <div id="jobsTab" class="tab-content active"></div>
            <div id="activeTab" class="tab-content"></div>
            <div id="historyTab" class="tab-content">
                <div id="totalEarnings" style="font-size:18px; color:#4ade80; text-align:center; margin-bottom:10px;">₡0</div>
                <div id="historyList"></div>
            </div>
        </div>

        <!-- SECCIÓN ADMINISTRADOR -->
        <div class="section" id="adminSection">
            <div class="logo"><i class="fas fa-shield-alt"></i> Admin Panel</div>
            <button class="btn btn-secondary logoutBtn">Cerrar Sesión</button>
            <div class="tabs">
                <button class="tab-btn active" data-tab="moves">Mudanzas</button>
                <button class="tab-btn" data-tab="partners">Socios</button>
                <button class="tab-btn" data-tab="clients">Clientes</button>
                <button class="tab-btn" data-tab="finances">Finanzas</button>
            </div>
            
            <div id="movesTab" class="tab-content active">
                <table class="admin-table">
                    <thead><tr><th>ID</th><th>Cliente/Tel</th><th>Socio</th><th>Total</th><th>Empresa(20%)</th><th>Estado</th></tr></thead>
                    <tbody id="movesTableBody"></tbody>
                </table>
            </div>

            <div id="partnersTab" class="tab-content">
                <div id="adminPartnersList"></div>
            </div>

            <div id="clientsTab" class="tab-content">
                <div id="adminClientsList"></div>
            </div>

            <div id="financesTab" class="tab-content">
                <div class="finance-card">
                    <label style="font-size:11px; color:#00d4ff;">Buscar por Fecha</label>
                    <input type="date" id="financeDateSearch" class="search-input" style="margin-top:5px;">
                    <div style="margin-top:15px; display:flex; justify-content:space-between;">
                        <span>Ingreso Total:</span>
                        <strong id="financeTotalDay" style="color:#4ade80;">₡0</strong>
                    </div>
                </div>
                <div id="financeDayList"></div>
            </div>
        </div>
    </div>
    <div class="map-container"><div id="map"></div></div>
</div>

<!-- MODAL FACTURA ELABORADA -->
<div class="modal" id="facturaModal">
    <div class="modal-content">
        <button class="modal-close" data-close="facturaModal">×</button>
        <div class="modal-header">Factura de Servicio</div>
        <div class="factura-box" id="facturaContent"></div>
        <button class="btn" id="confirmMoveBtn" style="margin-top:15px;">Confirmar y Pagar (SINPE)</button>
    </div>
</div>

<!-- MODAL SOCIO EDITABLE -->
<div class="modal" id="partnerEditModal">
    <div class="modal-content">
        <button class="modal-close" data-close="partnerEditModal">×</button>
        <div class="modal-header">Perfil del Socio</div>
        <div style="text-align:center;">
            <img src="https://i.pravatar.cc/150?u=partner" class="profile-img" id="partnerEditImg">
            <input type="text" id="partnerEditName" class="search-input" style="margin-bottom:10px; text-align:center; font-weight:bold;">
        </div>
        <div class="detail-grid">
            <div class="detail-item"><label class="detail-label">Teléfono</label><input type="text" id="partnerEditPhone" class="search-input"></div>
            <div class="detail-item"><label class="detail-label">Placa</label><input type="text" id="partnerEditPlate" class="search-input"></div>
            <div class="detail-item"><label class="detail-label">Licencia</label><input type="text" id="partnerEditLicense" class="search-input"></div>
            <div class="detail-item"><label class="detail-label">Seguro</label><input type="text" id="partnerEditInsurance" class="search-input"></div>
        </div>
        <button class="btn" id="savePartnerBtn" style="margin-top:15px;">Guardar Cambios</button>
    </div>
</div>

<!-- MODAL CLIENTE DETALLE -->
<div class="modal" id="clientDetailModal">
    <div class="modal-content">
        <button class="modal-close" data-close="clientDetailModal">×</button>
        <div class="modal-header">Historial del Cliente</div>
        <div id="clientInfoBox" style="margin-bottom:15px; padding:10px; background:#222; border-radius:8px;"></div>
        <div id="clientHistoryList"></div>
    </div>
</div>

<!-- MODAL MAPA VIAJE -->
<div class="modal" id="tripMapModal">
    <div class="modal-content">
        <button class="modal-close" data-close="tripMapModal">×</button>
        <div class="modal-header">Detalle del Viaje</div>
        <div id="tripDetailInfo" style="margin-bottom:10px; font-size:13px;"></div>
        <div id="miniMap" style="width:100%; height:300px; border-radius:8px;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCppQ2yPzQxTMSs8GfBCSyKzoQoUUzaWJo",
        authDomain: "mudanzascanaan.firebaseapp.com",
        databaseURL: "https://mudanzascanaan-default-rtdb.firebaseio.com",
        projectId: "mudanzascanaan",
        storageBucket: "mudanzascanaan.firebasestorage.app",
        messagingSenderId: "198057203593",
        appId: "1:198057203593:web:d8a5d2f575bcc565b73358"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    document.getElementById('connStatus').innerText = "✅ Firebase Conectado";

    let map, miniMap, selectedOrigin, selectedDestination, currentUser, selectedTransporter, routingControl;
    let markers = {};
    let searchTimeout;

    const transporters = [
        { id: 1, name: 'Carlos Rodríguez', phone: '8888-1111', plate: 'BC-123', email: 'carlos@test.com', pass: '1234', license: 'B2', insurance: 'INS-992', img: 'https://i.pravatar.cc/150?u=1' },
        { id: 2, name: 'Miguel Vargas', phone: '8888-2222', plate: 'CL-456', email: 'miguel@test.com', pass: '1234', license: 'B3', insurance: 'INS-112', img: 'https://i.pravatar.cc/150?u=2' },
        { id: 3, name: 'Ana Quesada', phone: '8888-3333', plate: 'PK-789', email: 'ana@test.com', pass: '1234', license: 'B1', insurance: 'INS-445', img: 'https://i.pravatar.cc/150?u=3' }
    ];

    // INICIALIZAR MAPA PRINCIPAL
    map = L.map('map').setView([9.9281, -84.0907], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const openModal = (id) => document.getElementById(id).classList.add('active');
    const closeModal = (id) => document.getElementById(id).classList.remove('active');

    // LOGIN
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('authEmail').value.trim().toLowerCase();
        const pass = document.getElementById('authPassword').value;
        const role = document.getElementById('authRole').value;
        
        if (role === 'admin' && email === 'admin@test.com' && pass === 'ADMIN') {
            currentUser = { email, role, name: 'Admin' };
        } else if (role === 'transporter') {
            const t = transporters.find(x => x.email === email && x.pass === pass);
            if (t) currentUser = { ...t, role };
        } else if (role === 'client') {
            currentUser = { email, role, name: email.split('@')[0], phone: '7000-0000' };
        }
        
        if (!currentUser) return alert('Error de acceso');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(role + 'Section').classList.add('active');
        if(role === 'client') document.getElementById('clientNameDisplay').innerText = currentUser.name;
        if(role === 'transporter') { document.getElementById('transNameDisplay').innerText = currentUser.name; listenToJobs(); }
        if(role === 'admin') listenToAdmin();
    });

    document.querySelectorAll('.logoutBtn').forEach(btn => btn.addEventListener('click', () => location.reload()));

    // BÚSQUEDA DE UBICACIONES
    const searchLocations = async (query, type) => {
        if (query.length < 3) return;
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}, Costa Rica&limit=5`);
            const results = await response.json();
            const div = document.getElementById(type + 'Suggestions');
            div.innerHTML = results.map(r => `<div class="suggestion-item" data-lat="${r.lat}" data-lon="${r.lon}" data-name="${r.display_name}" data-type="${type}">${r.display_name.split(',')[0]}</div>`).join('');
            div.classList.add('active');
        } catch (e) {}
    };

    document.getElementById('originSearch').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => searchLocations(e.target.value, 'origin'), 400);
    });
    document.getElementById('destinationSearch').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => searchLocations(e.target.value, 'destination'), 400);
    });

    document.addEventListener('click', (e) => {
        const item = e.target.closest('.suggestion-item');
        if (item) {
            const { lat, lon, name, type } = item.dataset;
            const loc = { lat: parseFloat(lat), lng: parseFloat(lon), name };
            if (type === 'origin') {
                selectedOrigin = loc;
                document.getElementById('originSearch').value = name.split(',')[0];
                if (markers.origin) map.removeLayer(markers.origin);
                markers.origin = L.marker([loc.lat, loc.lng]).addTo(map).bindPopup('Origen');
            } else {
                selectedDestination = loc;
                document.getElementById('destinationSearch').value = name.split(',')[0];
                if (markers.destination) map.removeLayer(markers.destination);
                markers.destination = L.marker([loc.lat, loc.lng]).addTo(map).bindPopup('Destino');
            }
            document.querySelectorAll('.search-suggestions').forEach(s => s.classList.remove('active'));
            if (selectedOrigin && selectedDestination) {
                if (routingControl) map.removeControl(routingControl);
                routingControl = L.Routing.control({
                    waypoints: [L.latLng(selectedOrigin.lat, selectedOrigin.lng), L.latLng(selectedDestination.lat, selectedDestination.lng)],
                    show: false, createMarker: () => null
                }).addTo(map);
            }
        }
    });

    // OFERTAS Y FACTURA
    document.getElementById('searchTransportersBtn').addEventListener('click', () => {
        if (!selectedOrigin || !selectedDestination) return alert('Selecciona rutas');
        const dist = 15; // Simulado
        const base = 15000 + (dist * 1000);
        document.getElementById('transportistasList').innerHTML = transporters.map(t => `
            <div class="transportista-card" onclick="prepareFactura(${t.id}, ${base})">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${t.name}</strong>
                    <span style="color:#4ade80;">₡${base.toLocaleString()}</span>
                </div>
                <div style="font-size:11px; color:#aaa;">${t.plate} | ⭐ 4.9</div>
            </div>
        `).join('');
    });

    window.prepareFactura = (tid, price) => {
        selectedTransporter = transporters.find(t => t.id === tid);
        const date = new Date();
        const code = Math.floor(1000 + Math.random() * 9000);
        const content = `
            <div class="factura-header">
                <h3>MUDANZASHUB CR</h3>
                <p>Factura Proforma</p>
            </div>
            <div class="factura-row"><span>Fecha:</span><span>${date.toLocaleDateString()}</span></div>
            <div class="factura-row"><span>Hora:</span><span>${date.toLocaleTimeString()}</span></div>
            <div class="factura-row"><span>Cliente:</span><span>${currentUser.name}</span></div>
            <div class="factura-row"><span>Socio:</span><span>${selectedTransporter.name}</span></div>
            <div class="factura-row"><span>Vehículo:</span><span>${selectedTransporter.plate}</span></div>
            <hr style="margin:10px 0; border:1px dashed #000;">
            <div class="factura-row"><span>Servicio Mudanza:</span><span>₡${price.toLocaleString()}</span></div>
            <div class="factura-row"><span>Peso Carga:</span><span>${document.getElementById('loadWeight').value}kg</span></div>
            <div class="factura-total"><span>TOTAL:</span><span>₡${price.toLocaleString()}</span></div>
            <p style="text-align:center; margin-top:15px; font-size:10px;">CÓDIGO DE SEGURIDAD: <strong>${code}</strong></p>
        `;
        document.getElementById('facturaContent').innerHTML = content;
        window.pendingMove = {
            client: currentUser.name, clientPhone: currentUser.phone, clientEmail: currentUser.email,
            transporter: selectedTransporter.name, transporterId: selectedTransporter.id,
            price: price, code: code, status: 'pending',
            origin: selectedOrigin, destination: selectedDestination,
            date: date.toLocaleDateString(), hour: date.toLocaleTimeString(),
            timestamp: Date.now()
        };
        openModal('facturaModal');
    };

    document.getElementById('confirmMoveBtn').addEventListener('click', () => {
        push(ref(db, 'moves'), window.pendingMove).then(() => {
            alert('Solicitud enviada con éxito');
            closeModal('facturaModal');
            location.reload();
        });
    });

    // LÓGICA TRANSPORTISTA
    const listenToJobs = () => {
        onValue(ref(db, 'moves'), (snap) => {
            const data = snap.val();
            const jobsTab = document.getElementById('jobsTab');
            const activeTab = document.getElementById('activeTab');
            const historyList = document.getElementById('historyList');
            jobsTab.innerHTML = ''; activeTab.innerHTML = ''; historyList.innerHTML = '';
            let earnings = 0;

            if (data) {
                Object.keys(data).forEach(key => {
                    const m = data[key];
                    if (m.transporterId === currentUser.id) {
                        const html = `
                            <div class="uber-job-card">
                                <div style="display:flex; justify-content:space-between;">
                                    <strong>${m.client}</strong>
                                    <span class="job-price">₡${m.price.toLocaleString()}</span>
                                </div>
                                <div style="font-size:11px; color:#aaa; margin:5px 0;">
                                    <i class="fas fa-clock"></i> ${m.date} ${m.hour} | <i class="fas fa-phone"></i> ${m.clientPhone}
                                </div>
                                <div style="background:#000; padding:5px; border-radius:4px; text-align:center; margin-bottom:10px;">
                                    CÓDIGO: <span style="color:#00d4ff; font-weight:bold;">${m.code}</span>
                                </div>
                                ${m.status === 'pending' ? `<button class="btn" onclick="updateStatus('${key}', 'in_progress')">Aceptar</button>` : ''}
                                ${m.status === 'in_progress' ? `<button class="btn" style="background:#4ade80;" onclick="updateStatus('${key}', 'completed')">Finalizar</button>` : ''}
                            </div>`;
                        if (m.status === 'pending') jobsTab.innerHTML += html;
                        else if (m.status === 'in_progress') activeTab.innerHTML += html;
                        else if (m.status === 'completed') {
                            earnings += m.price;
                            historyList.innerHTML += `<div style="padding:8px; background:#222; margin-bottom:5px; border-radius:4px; font-size:12px;">${m.date} - ${m.client} - ₡${m.price.toLocaleString()}</div>`;
                        }
                    }
                });
            }
            document.getElementById('totalEarnings').innerText = 'Total: ₡' + earnings.toLocaleString();
        });
    };

    window.updateStatus = (key, status) => update(ref(db, `moves/${key}`), { status });

    // LÓGICA ADMIN
    const listenToAdmin = () => {
        onValue(ref(db, 'moves'), (snap) => {
            const data = snap.val();
            const tbody = document.getElementById('movesTableBody');
            const clientList = document.getElementById('adminClientsList');
            tbody.innerHTML = ''; clientList.innerHTML = '';
            const clients = {};

            if (data) {
                Object.keys(data).forEach(key => {
                    const m = data[key];
                    const comm = m.price * 0.2;
                    tbody.innerHTML += `
                        <tr class="clickable-row" onclick="showTripMap('${key}')">
                            <td>#${key.slice(-4)}</td>
                            <td>${m.client}<br><small>${m.clientPhone}</small></td>
                            <td>${m.transporter}</td>
                            <td>₡${m.price.toLocaleString()}</td>
                            <td style="color:#4ade80;">₡${comm.toLocaleString()}</td>
                            <td><span class="status-badge status-${m.status}">${m.status}</span></td>
                        </tr>`;
                    
                    if (!clients[m.clientEmail]) clients[m.clientEmail] = { name: m.client, phone: m.clientPhone, trips: [] };
                    clients[m.clientEmail].trips.push(m);
                });

                Object.keys(clients).forEach(email => {
                    const c = clients[email];
                    clientList.innerHTML += `<div class="partner-item" onclick="showClientDetail('${email}')">${c.name} (${c.trips.length} viajes)</div>`;
                });
                window.allClients = clients;
                window.allMoves = data;
            }
        });

        document.getElementById('adminPartnersList').innerHTML = transporters.map(t => `
            <div class="partner-item" onclick="editPartner(${t.id})">
                <img src="${t.img}" style="width:30px; height:30px; border-radius:50%; vertical-align:middle; margin-right:10px;">
                ${t.name} - ${t.plate}
            </div>
        `).join('');
    };

    window.showTripMap = (key) => {
        const m = window.allMoves[key];
        document.getElementById('tripDetailInfo').innerHTML = `
            <strong>Cliente:</strong> ${m.client} | <strong>Monto:</strong> ₡${m.price.toLocaleString()}<br>
            <strong>Fecha:</strong> ${m.date} | <strong>Estado:</strong> ${m.status.toUpperCase()}
        `;
        openModal('tripMapModal');
        setTimeout(() => {
            if (miniMap) miniMap.remove();
            miniMap = L.map('miniMap').setView([m.origin.lat, m.origin.lng], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMap);
            L.marker([m.origin.lat, m.origin.lng]).addTo(miniMap).bindPopup('Origen');
            L.marker([m.destination.lat, m.destination.lng]).addTo(miniMap).bindPopup('Destino');
            L.polyline([[m.origin.lat, m.origin.lng], [m.destination.lat, m.destination.lng]], {color: 'blue'}).addTo(miniMap);
        }, 200);
    };

    window.showClientDetail = (email) => {
        const c = window.allClients[email];
        document.getElementById('clientInfoBox').innerHTML = `<strong>${c.name}</strong><br>Email: ${email}<br>Tel: ${c.phone}`;
        document.getElementById('clientHistoryList').innerHTML = c.trips.map(t => `
            <div style="font-size:11px; padding:8px; border-bottom:1px solid #333;">
                ${t.date} - ${t.origin.name.split(',')[0]} → ${t.destination.name.split(',')[0]} - ₡${t.price.toLocaleString()} (${t.status})
            </div>
        `).join('');
        openModal('clientDetailModal');
    };

    window.editPartner = (id) => {
        const t = transporters.find(x => x.id === id);
        document.getElementById('partnerEditImg').src = t.img;
        document.getElementById('partnerEditName').value = t.name;
        document.getElementById('partnerEditPhone').value = t.phone;
        document.getElementById('partnerEditPlate').value = t.plate;
        document.getElementById('partnerEditLicense').value = t.license;
        document.getElementById('partnerEditInsurance').value = t.insurance;
        openModal('partnerEditModal');
    };

    // FINANZAS POR CALENDARIO
    document.getElementById('financeDateSearch').addEventListener('change', (e) => {
        const selectedDate = new Date(e.target.value + 'T00:00:00').toLocaleDateString();
        let total = 0;
        const list = document.getElementById('financeDayList');
        list.innerHTML = '';
        
        if (window.allMoves) {
            Object.values(window.allMoves).forEach(m => {
                if (m.date === selectedDate) {
                    total += m.price;
                    list.innerHTML += `<div style="font-size:11px; padding:8px; border-bottom:1px solid #333;">${m.hour} - ${m.client} - ₡${m.price.toLocaleString()}</div>`;
                }
            });
        }
        document.getElementById('financeTotalDay').innerText = '₡' + total.toLocaleString();
    });

    // TABS
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const section = btn.closest('.section');
            section.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            section.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            section.querySelector(`#${btn.dataset.tab}Tab`).classList.add('active');
        });
    });

    document.querySelectorAll('.modal-close').forEach(btn => {
        btn.addEventListener('click', () => closeModal(btn.dataset.close));
    });
</script>
</body>
</html>
