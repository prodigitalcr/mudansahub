<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MudanzasHub Costa Rica - Solución Total V2 + IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* ESTILOS ORIGINALES */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #fff; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 440px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .logo { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #00d4ff; display: flex; align-items: center; gap: 10px; }
        .user-greeting { background: linear-gradient(135deg, #1a3a3a, #2a2a2a); border: 1px solid #00d4ff44; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: 600; color: #aaa; }
        .search-container { position: relative; margin-bottom: 18px; }
        .search-input { width: 100%; padding: 11px 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 14px; }
        .search-input:focus { outline: none; border-color: #00d4ff; box-shadow: 0 0 10px rgba(0,212,255,0.3); }
        .btn { width: 100%; padding: 13px; background: #00d4ff; color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.3s ease; }
        .btn:hover { background: #00b8d4; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,212,255,0.4); }
        .btn-secondary { background: #333; color: #fff; margin-bottom: 10px; }
        .btn-sm { width: auto; padding: 7px 14px; font-size: 12px; display: inline-block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; border: 1px solid #444; border-radius: 12px; padding: 28px; width: 92%; max-width: 620px; max-height: 92vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.9); position: relative; }
        .modal-header { font-size: 19px; font-weight: bold; margin-bottom: 18px; color: #00d4ff; }
        .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; width: auto; padding: 0; }
        .section { display: none; }
        .section.active { display: block; }
        .tabs { display: flex; background: #222; border-radius: 8px; padding: 4px; margin-bottom: 18px; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; color: #888; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { background: #333; color: #00d4ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .admin-table th { text-align: left; padding: 12px 8px; background: #222; color: #aaa; border: 1px solid #333; }
        .admin-table td { padding: 12px 8px; border: 1px solid #222; }
        .admin-footer { background: #1a3a3a; padding: 10px; border-radius: 0 0 8px 8px; border: 1px solid #333; border-top: none; display: flex; justify-content: flex-end; gap: 20px; font-size: 12px; font-weight: bold; }
        
        /* ESTILOS IA AGENTE */
        .ai-chat-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #00d4ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,212,255,0.5); z-index: 2000; transition: 0.3s; }
        .ai-chat-btn:hover { transform: scale(1.1); }
        .ai-chat-window { position: fixed; bottom: 90px; right: 20px; width: 350px; height: 500px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; display: none; flex-direction: column; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .ai-chat-window.active { display: flex; }
        .ai-chat-header { background: #00d4ff; color: #000; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .ai-chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .ai-msg { max-width: 80%; padding: 10px; border-radius: 8px; font-size: 13px; line-height: 1.4; }
        .ai-msg-user { align-self: flex-end; background: #333; color: #fff; }
        .ai-msg-bot { align-self: flex-start; background: #00d4ff22; color: #00d4ff; border: 1px solid #00d4ff44; }
        .ai-chat-input-area { padding: 10px; border-top: 1px solid #333; display: flex; gap: 10px; }
        .ai-chat-input { flex: 1; background: #2a2a2a; border: 1px solid #444; border-radius: 20px; padding: 8px 15px; color: #fff; font-size: 13px; }
        .ai-chat-send { background: #00d4ff; color: #000; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        /* ESTILOS PANEL ENTRENAMIENTO */
        .training-card { background: #222; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .training-label { font-size: 12px; color: #00d4ff; font-weight: bold; margin-bottom: 8px; display: block; }
        .training-textarea { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 6px; color: #fff; padding: 10px; font-size: 12px; resize: vertical; min-height: 80px; }
        .qa-item { background: #2a2a2a; padding: 10px; border-radius: 6px; margin-bottom: 10px; border-left: 3px solid #00d4ff; position: relative; }
        .qa-delete { position: absolute; top: 5px; right: 5px; color: #ff4b4b; cursor: pointer; font-size: 14px; }
        
        /* MÓVIL OPTIMIZADO */
        @media (max-width: 480px) {
            .sidebar { width: 100%; position: absolute; z-index: 2000; height: 100%; }
            .ai-chat-window { width: 90%; right: 5%; left: 5%; bottom: 80px; height: 70vh; }
        }
        
        .btn-whatsapp { background: #25d366; color: #fff; }
        .btn-reject { background: #ff4b4b; color: #fff; }
        .btn-accept { background: #4ade80; color: #000; }
        .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .status-pending { background: #f59e0b22; color: #f59e0b; }
        .status-in_progress { background: #3b82f622; color: #3b82f6; }
        .status-completed { background: #10b98122; color: #10b981; }
        .vehicle-option { background: #2a2a2a; border: 2px solid #444; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; }
        .vehicle-option.active { border-color: #00d4ff; background: #1a3a3a; }
        .partner-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; transition: background 0.2s; }
        .partner-item:hover { background: #2a2a2a; color: #00d4ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <!-- SECCIÓN AUTH -->
        <div class="section active" id="authSection">
            <div class="logo"><i class="fas fa-truck-loading"></i> MudanzasHub</div>
            <div class="user-greeting" id="connStatus">Conectando a Firebase...</div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="authEmail" class="search-input" placeholder="ejemplo@test.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="authPassword" class="search-input" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Tipo de Usuario</label>
                <select id="authRole" class="search-input">
                    <option value="client">Cliente</option>
                    <option value="transporter">Socio Transportista</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
            <button class="btn" id="loginBtn">Iniciar Sesión</button>
        </div>

        <!-- SECCIÓN CLIENTE -->
        <div class="section" id="clientSection">
            <div class="logo"><i class="fas fa-user"></i> Mi Perfil</div>
            <div class="user-greeting"><i class="fas fa-smile"></i> Hola, <span id="clientNameDisplay">Usuario</span></div>
            <button class="btn btn-secondary logoutBtn">Cerrar Sesión</button>
            
            <div class="form-group">
                <label>¿Desde dónde salimos?</label>
                <input type="text" id="originInput" class="search-input" placeholder="Punto de origen">
            </div>
            <div class="form-group">
                <label>¿Hacia dónde vamos?</label>
                <input type="text" id="destInput" class="search-input" placeholder="Punto de destino">
            </div>
            <button class="btn" id="requestMoveBtn">Cotizar Mudanza</button>
        </div>

        <!-- SECCIÓN ADMINISTRADOR -->
        <div class="section" id="adminSection">
            <div class="logo"><i class="fas fa-shield-alt"></i> Admin Panel</div>
            <button class="btn btn-secondary logoutBtn">Cerrar Sesión</button>
            <div class="tabs">
                <button class="tab-btn active" data-tab="moves">Mudanzas</button>
                <button class="tab-btn" data-tab="partners">Socios</button>
                <button class="tab-btn" data-tab="aiTraining">Entrenamiento IA</button>
            </div>
            
            <div id="movesTab" class="tab-content active">
                <div style="overflow-x:auto;">
                    <table class="admin-table">
                        <thead><tr><th>ID</th><th>Cliente</th><th>Socio</th><th>Total</th><th>Estado</th></tr></thead>
                        <tbody id="movesTableBody"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="partnersTab" class="tab-content">
                <div id="adminPartnersList"></div>
            </div>

            <!-- NUEVA COLUMNA DE ENTRENAMIENTO IA -->
            <div id="aiTrainingTab" class="tab-content">
                <div style="margin-bottom:15px; font-weight:bold; color:#00d4ff;">Configuración del Agente Experto</div>
                
                <div class="training-card">
                    <label class="training-label">Conocimiento y Reglas de Venta</label>
                    <textarea id="aiRules" class="training-textarea" placeholder="Ej: Eres un experto en ventas de mudanzas en Costa Rica. Siempre sé amable, ofrece descuentos si el cliente duda..."></textarea>
                    <button class="btn btn-sm" id="saveAiRules" style="margin-top:10px;">Guardar Reglas</button>
                </div>

                <div class="training-card">
                    <label class="training-label">Preguntas y Respuestas Frecuentes</label>
                    <div id="qaList" style="max-height: 200px; overflow-y: auto; margin-bottom: 10px;"></div>
                    <input type="text" id="newQ" class="search-input" style="margin-bottom:5px; font-size:12px;" placeholder="Pregunta...">
                    <textarea id="newA" class="training-textarea" style="min-height:50px;" placeholder="Respuesta..."></textarea>
                    <button class="btn btn-sm" id="addQA" style="margin-top:10px; background:#4ade80; color:#000;">Agregar Q&A</button>
                </div>

                <div class="training-card">
                    <label class="training-label">Subir Archivos de Fuentes (PDF/TXT)</label>
                    <div class="upload-area" id="aiUploadArea" style="padding:10px;">
                        <input type="file" id="aiFileInput" style="display:none" accept=".pdf,.txt">
                        <i class="fas fa-file-upload" style="font-size:20px; color:#555;"></i>
                        <div style="font-size:10px; color:#888;">Click para subir conocimiento</div>
                    </div>
                    <div id="aiFileList" style="font-size:11px; color:#aaa;"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="map-container"><div id="map"></div></div>
</div>

<!-- AGENTE DE VENTAS IA (CHAT FLOTANTE) -->
<div class="ai-chat-btn" id="openAiChat"><i class="fas fa-robot"></i></div>
<div class="ai-chat-window" id="aiChatWindow">
    <div class="ai-chat-header">
        <span><i class="fas fa-headset"></i> Asistente Experto</span>
        <i class="fas fa-times" id="closeAiChat" style="cursor:pointer;"></i>
    </div>
    <div class="ai-chat-messages" id="aiChatMessages">
        <div class="ai-msg ai-msg-bot">¡Hola! Soy tu asistente experto en mudanzas. ¿En qué puedo ayudarte hoy?</div>
    </div>
    <div class="ai-chat-input-area">
        <input type="text" class="ai-chat-input" id="aiChatInput" placeholder="Escribe tu duda aquí...">
        <button class="ai-chat-send" id="sendAiMsg"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCppQ2yPzQxTMSs8GfBCSyKzoQoUUzaWJo",
        authDomain: "mudanzascanaan.firebaseapp.com",
        databaseURL: "https://mudanzascanaan-default-rtdb.firebaseio.com",
        projectId: "mudanzascanaan",
        storageBucket: "mudanzascanaan.firebasestorage.app",
        messagingSenderId: "198057203593",
        appId: "1:198057203593:web:d8a5d2f575bcc565b73358"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    document.getElementById('connStatus').innerText = "✅ Firebase Conectado";
    document.getElementById('connStatus').style.color = "#4ade80";

    let map, currentUser;
    let transporters = [];

    // INICIALIZAR MAPA
    map = L.map('map').setView([9.9281, -84.0907], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // LOGIN SIMPLIFICADO (MANTENIENDO LÓGICA)
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('authEmail').value.trim().toLowerCase();
        const pass = document.getElementById('authPassword').value;
        const role = document.getElementById('authRole').value;

        if (role === 'admin' && email === 'admin@test.com' && pass === 'ADMIN') {
            currentUser = { email, role, name: 'Admin' };
            document.getElementById('authSection').classList.remove('active');
            document.getElementById('adminSection').classList.add('active');
            document.querySelector('.map-container').style.display = 'none';
            loadAiTraining();
        } else {
            currentUser = { email, role, name: 'Usuario' };
            document.getElementById('authSection').classList.remove('active');
            document.getElementById('clientSection').classList.add('active');
        }
    });

    document.querySelectorAll('.logoutBtn').forEach(btn => btn.addEventListener('click', () => location.reload()));

    // LÓGICA DE PESTAÑAS
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const section = btn.closest('.section');
            section.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            section.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
        });
    });

    // --- LÓGICA AGENTE IA ---
    const chatBtn = document.getElementById('openAiChat');
    const chatWindow = document.getElementById('aiChatWindow');
    const closeChat = document.getElementById('closeAiChat');
    const chatInput = document.getElementById('aiChatInput');
    const sendBtn = document.getElementById('sendAiMsg');
    const chatMessages = document.getElementById('aiChatMessages');

    chatBtn.onclick = () => chatWindow.classList.toggle('active');
    closeChat.onclick = () => chatWindow.classList.remove('active');

    const addMsg = (text, type) => {
        const div = document.createElement('div');
        div.className = `ai-msg ai-msg-${type}`;
        div.innerText = text;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    };

    sendBtn.onclick = async () => {
        const text = chatInput.value.trim();
        if(!text) return;
        addMsg(text, 'user');
        chatInput.value = '';
        
        // Simulación de respuesta experta basada en entrenamiento
        addMsg("Analizando tu consulta con mi base de conocimientos...", 'bot');
        
        onValue(ref(db, 'ai_config'), (snap) => {
            const config = snap.val() || {};
            const rules = config.rules || "Eres un experto en mudanzas.";
            const qas = config.qa ? Object.values(config.qa) : [];
            
            setTimeout(() => {
                // Buscar en Q&A
                const match = qas.find(item => text.toLowerCase().includes(item.q.toLowerCase()));
                if(match) {
                    addMsg(match.a, 'bot');
                } else {
                    addMsg("Como experto en MudanzasHub, te informo que procesamos mudanzas en todo el país con los mejores precios. ¿Deseas una cotización formal?", 'bot');
                }
            }, 1000);
        }, { onlyOnce: true });
    };

    // --- LÓGICA ENTRENAMIENTO IA (ADMIN) ---
    const loadAiTraining = () => {
        onValue(ref(db, 'ai_config'), (snap) => {
            const data = snap.val() || {};
            document.getElementById('aiRules').value = data.rules || '';
            
            const qaList = document.getElementById('qaList');
            qaList.innerHTML = '';
            if(data.qa) {
                Object.keys(data.qa).forEach(key => {
                    const item = data.qa[key];
                    qaList.innerHTML += `
                        <div class="qa-item">
                            <i class="fas fa-trash qa-delete" onclick="deleteQA('${key}')"></i>
                            <strong>Q:</strong> ${item.q}<br>
                            <strong>A:</strong> ${item.a}
                        </div>
                    `;
                });
            }

            const fileList = document.getElementById('aiFileList');
            fileList.innerHTML = '';
            if(data.files) {
                Object.keys(data.files).forEach(key => {
                    fileList.innerHTML += `<div><i class="fas fa-file-alt"></i> ${data.files[key].name}</div>`;
                });
            }
        });
    };

    document.getElementById('saveAiRules').onclick = () => {
        const rules = document.getElementById('aiRules').value;
        update(ref(db, 'ai_config'), { rules });
        alert('Reglas guardadas correctamente');
    };

    document.getElementById('addQA').onclick = () => {
        const q = document.getElementById('newQ').value;
        const a = document.getElementById('newA').value;
        if(!q || !a) return alert('Completa pregunta y respuesta');
        push(ref(db, 'ai_config/qa'), { q, a });
        document.getElementById('newQ').value = '';
        document.getElementById('newA').value = '';
    };

    window.deleteQA = (key) => {
        if(confirm('¿Eliminar esta pregunta?')) {
            remove(ref(db, `ai_config/qa/${key}`));
        }
    };

    // Simulación de subida de archivos
    document.getElementById('aiUploadArea').onclick = () => document.getElementById('aiFileInput').click();
    document.getElementById('aiFileInput').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            push(ref(db, 'ai_config/files'), { name: file.name, date: new Date().toISOString() });
            alert('Archivo "' + file.name + '" procesado para entrenamiento.');
        }
    };

</script>
</body>
</html>
