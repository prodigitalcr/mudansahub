<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MudanzasHub - DEBUG MODE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #fff; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 440px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; padding: 20px; }
        .map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .logo { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #00d4ff; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 7px; font-size: 13px; color: #aaa; }
        .search-input { width: 100%; padding: 11px 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; }
        .btn { width: 100%; padding: 13px; background: #00d4ff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .section { display: none; }
        .section.active { display: block !important; }
        .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .status-pending { background: #f59e0b22; color: #f59e0b; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .admin-table th, .admin-table td { text-align: left; padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <!-- LOGIN -->
        <div class="section active" id="authSection">
            <div class="logo"><i class="fas fa-truck"></i> MudanzasHub</div>
            <div class="form-group"><label>Email</label><input type="email" id="authEmail" class="search-input" value="admin@test.com"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="authPassword" class="search-input" value="ADMIN"></div>
            <div class="form-group">
                <label>Rol</label>
                <select id="authRole" class="search-input">
                    <option value="client">Cliente</option>
                    <option value="transporter">Transportista</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
            <button class="btn" onclick="handleLogin()">ENTRAR AHORA</button>
            <p id="debugStatus" style="font-size:11px; color:orange; margin-top:15px; text-align:center;">Iniciando Firebase...</p>
        </div>

        <!-- CLIENT -->
        <div class="section" id="clientSection">
            <div class="logo">Panel Cliente</div>
            <button class="btn" onclick="location.reload()" style="background:#333; color:#fff; margin-bottom:20px;">Cerrar Sesión</button>
            <p>Bienvenido al panel de cliente. Aquí puedes solicitar mudanzas.</p>
        </div>

        <!-- TRANSPORTER -->
        <div class="section" id="transporterSection">
            <div class="logo">Panel Transportista</div>
            <button class="btn" onclick="location.reload()" style="background:#333; color:#fff; margin-bottom:20px;">Cerrar Sesión</button>
            <div id="jobsList">Cargando ofertas...</div>
        </div>

        <!-- ADMIN -->
        <div class="section" id="adminSection">
            <div class="logo">Panel Administrador</div>
            <button class="btn" onclick="location.reload()" style="background:#333; color:#fff; margin-bottom:20px;">Cerrar Sesión</button>
            <table class="admin-table">
                <thead><tr><th>ID</th><th>Estado</th></tr></thead>
                <tbody id="adminMoves"></tbody>
            </table>
        </div>
    </div>
    <div class="map-container"><div id="map"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCppQ2yPzQxTMSs8GfBCSyKzoQoUUzaWJo",
        authDomain: "mudanzascanaan.firebaseapp.com",
        databaseURL: "https://mudanzascanaan-default-rtdb.firebaseio.com",
        projectId: "mudanzascanaan",
        storageBucket: "mudanzascanaan.firebasestorage.app",
        messagingSenderId: "198057203593",
        appId: "1:198057203593:web:d8a5d2f575bcc565b73358"
    };

    try {
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        document.getElementById('debugStatus').innerText = "✅ Firebase Conectado";
        document.getElementById('debugStatus').style.color = "#4ade80";

        // Exponer funciones al botón
        window.handleLogin = function() {
            const role = document.getElementById('authRole').value;
            console.log("Intentando entrar como:", role);
            
            // CAMBIO DE SECCIÓN FORZADO
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(role + 'Section');
            target.style.display = 'block';
            target.classList.add('active');

            if(role === 'admin') {
                onValue(ref(db, 'moves'), (snap) => {
                    const data = snap.val();
                    const tbody = document.getElementById('adminMoves');
                    tbody.innerHTML = '';
                    if(data) {
                        Object.keys(data).forEach(k => {
                            tbody.innerHTML += `<tr><td>#${k.slice(-4)}</td><td>${data[k].status}</td></tr>`;
                        });
                    }
                }, (error) => {
                    alert("⚠️ ERROR DE FIREBASE: Revisa las Reglas de Seguridad. " + error.message);
                });
            }
        };

    } catch (e) {
        document.getElementById('debugStatus').innerText = "❌ Error de Configuración";
        document.getElementById('debugStatus').style.color = "red";
        console.error(e);
    }

    // Mapa básico
    const map = L.map('map').setView([9.9281, -84.0907], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
</script>
</body>
</html>
